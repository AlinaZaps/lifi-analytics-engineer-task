version: 2

models:
  - name: stg_fiat_daily_rates
    description: >
      Cleaned daily fiat exchange rates, sourced from Fixer.io.
    columns:
      - name: rate_date
        description: FX rate date.
        tests:
          - not_null
      - name: base_currency
        description: Base currency code.
        tests:
          - not_null
      - name: target_currency
        description: Target currency code (e.g. USD, GBP).
        tests:
          - not_null
      - name: rate
        description: FX rate for target_currency quoted in base_currency.
        tests:
          - not_null

